<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexa Dijital | Premium Performans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* RENK PALETİ - TÜM SİTEDE SABİTLENDİ */
        --neon-mint: #00ffd1;
        --electric-blue: #0070ff;
        --bg-dark: #020a10;
        --deep-space: #01060a;
        --text-main: #fdfdfd;
        --text-muted: #8ca3af;
        --glass-border: rgba(0, 255, 209, 0.15);
      }

      body, html {
        margin: 0;
        padding: 0;
        background-color: var(--bg-dark);
        color: var(--text-main);
        font-family: "Space Grotesk", sans-serif;
        overflow-x: hidden;
      }

      /* --- GENEL ARKA PLAN EFEKTLERİ --- */
      .noise-overlay {
        position: fixed;
        inset: 0;
        opacity: 0.04;
        pointer-events: none;
        background: url("https://grainy-gradients.vercel.app/noise.svg");
        z-index: 99;
      }

      .light-wrapper {
        position: fixed;
        inset: -20%;
        transform: rotate(-15deg);
        filter: blur(100px);
        z-index: 0;
        pointer-events: none;
      }

      .ray {
        position: absolute;
        mix-blend-mode: screen;
        animation: flow 10s ease-in-out infinite alternate;
      }

      .ray-1 {
        left: 10%; width: 40%; height: 100%;
        background: linear-gradient(180deg, var(--neon-mint) 0%, var(--electric-blue) 50%, transparent 100%);
        opacity: 0.15;
      }

      .ray-2 {
        right: 10%; width: 30%; height: 100%;
        background: linear-gradient(180deg, var(--electric-blue) 0%, transparent 100%);
        opacity: 0.1;
        animation-delay: -3s;
      }

      @keyframes flow {
        from { transform: translateY(-5%) scale(1); opacity: 0.1; }
        to { transform: translateY(5%) scale(1.1); opacity: 0.2; }
      }

      /* --- SPLASH SCREEN (RENKLER GÜNCELLENDİ) --- */
      .splash-screen {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background-color: var(--bg-dark);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s ease, visibility 0.8s;
      }

      .splash-aurora {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, rgba(0, 255, 209, 0.05) 0%, transparent 70%);
      }

      .splash-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.2;
      }

      .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--electric-blue); }
      .blob-2 { bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: var(--neon-mint); }

      .splash-content {
        position: relative;
        z-index: 10;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .splash-logo {
        width: 120px;
        height: 120px;
        fill: white;
        filter: drop-shadow(0 0 15px rgba(0, 255, 209, 0.3));
      }

      .splash-text h1 {
        font-size: 4rem;
        letter-spacing: 10px;
        margin: 0;
        background: linear-gradient(to right, #fff, var(--neon-mint));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* --- NAV BAR --- */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 25px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        background: rgba(2, 10, 16, 0.7);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid var(--glass-border);
      }

      .nav-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        font-size: 1.5rem;
      }

      .nav-logo-small { width: 40px; height: 40px; fill: white; }

      .nav-menu {
        display: flex;
        gap: 30px;
        list-style: none;
      }

      .nav-link {
        text-decoration: none;
        color: var(--text-muted);
        transition: color 0.3s;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .nav-link:hover { color: var(--neon-mint); }

      .btn-contact {
        padding: 10px 25px;
        border: 1px solid var(--neon-mint);
        color: var(--neon-mint);
        border-radius: 5px;
        background: transparent;
        transition: 0.3s;
      }

      .btn-contact:hover {
        background: var(--neon-mint);
        color: var(--bg-dark);
        box-shadow: 0 0 20px rgba(0, 255, 209, 0.4);
      }

      /* Yükleme sonrası ana içerik */
      .main-content {
        padding-top: 150px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        transform: translateY(20px);
        transition: 1s all ease;
      }

      .content-visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>

  <body>
    <div class="noise-overlay"></div>
    
    <div class="light-wrapper">
      <div class="ray ray-1"></div>
      <div class="ray ray-2"></div>
    </div>

    <div id="splash" class="splash-screen">
      <div class="splash-aurora"></div>
      <div class="splash-blob blob-1"></div>
      <div class="splash-blob blob-2"></div>
      
      <div class="splash-content">
        <svg viewBox="340 320 400 440" class="splash-logo">
          <path d="M540,325 L685,410 L685,580 L540,665 L395,580 L395,410 Z" fill="none" stroke="#00ffd1" stroke-width="8" />
          <path d="M425.5,432.1l45.6,108.6-45.6,108.7-37.2-21.7-.3-173.6c.3-1.9,2.5-2.8,4.1-3.8,7.5-4.9,22.4-14,30.3-17.4s2-1,3.1-.8Z" />
          <polygon points="690.4 452.4 690.6 628 655.5 647.9 610.7 542.5 610.4 540.1 655.5 433.4 690.4 452.4" />
        </svg>
        <div class="splash-text">
          <h1>HEXA</h1>
          <p style="color: var(--neon-mint); letter-spacing: 5px;">DİJİTAL</p>
        </div>
      </div>
    </div>

    <nav class="navbar">
      <div class="nav-brand">
        <svg viewBox="340 320 400 440" class="nav-logo-small">
          <path d="M425.5,432.1l45.6,108.6-45.6,108.7-37.2-21.7-.3-173.6c.3-1.9,2.5-2.8,4.1-3.8,7.5-4.9,22.4-14,30.3-17.4s2-1,3.1-.8Z" />
          <polygon points="690.4 452.4 690.6 628 655.5 647.9 610.7 542.5 610.4 540.1 655.5 433.4 690.4 452.4" />
        </svg>
        <span>HEXA <span style="color:var(--neon-mint)">DIJITAL</span></span>
      </div>
      <ul class="nav-menu">
        <li><a href="#" class="nav-link">Hizmetler</a></li>
        <li><a href="#" class="nav-link">Projeler</a></li>
        <li><a href="#" class="nav-link">Hakkımızda</a></li>
      </ul>
      <button class="btn-contact">İletişime Geç</button>
    </nav>

    <main id="main" class="main-content">
      <h2 style="font-size: 3rem; text-align: center;">Geleceği <br> <span style="color: var(--neon-mint);">Birlikte</span> Tasarlayalım</h2>
      <p style="color: var(--text-muted); max-width: 600px; text-align: center; margin-top: 20px;">
        Premium dijital çözümlerle markanızı bir üst seviyeye taşıyoruz. Modern arayüzler ve yüksek performanslı altyapılar.
      </p>
    </main>

    <script>
      // Basit Splash Kontrolü
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          const main = document.getElementById('main');
          
          splash.style.opacity = '0';
          setTimeout(() => {
            splash.style.visibility = 'hidden';
            main.classList.add('content-visible');
          }, 800);
        }, 2000); // 2 saniye sonra ana ekrana geçer
      });
    </script>
  </body>
</html>
